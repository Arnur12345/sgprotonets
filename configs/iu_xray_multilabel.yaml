# IU Chest X-Ray, MULTI-LABEL with binary decomposition.
#
# Privileged-text formulation: reports drive only the alignment + vis2sem
# auxiliary losses on positive-support visual features. They never reach
# forward_binary_episode, the prototypes, or the logits — at training,
# validation, OR test time. See training/episode_loop.py.
#
# Usage:
#   python scripts/train.py --config configs/iu_xray_multilabel.yaml

seed: 42

# ── Model — unfreeze last ViT blocks for medical adaptation ─────────────────
model:
  d_model: 192
  d_visual: 768
  d_semantic: 768
  d_hidden: 384

  visual_encoder:
    name: "google/vit-base-patch16-224"
    type: "vit"
    freeze: true
    unfreeze_last_n_blocks: 2   # was 0 — generic ImageNet features cannot
                                # discriminate chest pathologies. Unfreezing the
                                # last 2 transformer blocks is the single biggest
                                # win for medical few-shot.

  semantic_encoder:
    name: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"
    type: "pubmedbert"
    freeze: true
    unfreeze_last_n_blocks: 0
    max_length: 256

  sgam:
    num_heads: 4
    dropout: 0.1
  fusion:
    dropout: 0.1
  vis2sem:
    d_hidden: 512

  distance: "cosine"
  prototype_mode: "bayesian_map"  # closed-form Gaussian posterior mean
                                  # for positive prototypes, with learnable
                                  # log_sigma_prior / log_sigma_lik scalars.

data:
  dataset: "iu_xray"
  data_dir: "data/processed_ml/"
  image_size: 224

  # 10 well-populated train classes; 4 rare held-out val classes.
  train_classes:
    - "effusion"
    - "pneumothorax"
    - "consolidation"
    - "infiltrate"
    - "atelectasis"
    - "edema"
    - "cardiomegaly"
    - "nodule"
    - "pneumonia"
    - "mass"
  val_classes:
    - "emphysema"
    - "hernia"
    - "pleural_thickening"
    - "fibrosis"
  test_classes:  []

multilabel:
  enabled: true
  n_labels: 5
  k_pos: 5            # was 3 — more support → cleaner positive prototypes
  k_neg: 5
  q_query: 10
  anchor_weight_adaptive: true

  # Episodes are already balanced (k_pos≈k_neg). focal_alpha=0.25 explicitly
  # de-weights positives — exactly the wrong direction. Switch to plain BCE.
  use_focal_loss: false
  focal_gamma: 2.0
  focal_alpha: 0.5

  lambda_margin: 0.2  # was 0.1 — push pos/neg prototypes further apart
  threshold: 0.4      # was 0.5 — under-confident model needs lower threshold
                      # to recover recall on the 4 rare val classes
  min_positives: 3
  min_negatives: 10

training:
  use_amp: true

  phase1:
    enabled: true
    num_epochs: 10    # was 15 — fewer epochs since we now fine-tune ViT
    batch_size: 12    # was 16 — leave VRAM for the unfrozen ViT blocks
    lr: 5e-5          # was 1e-4 — lower LR for fine-tuning
    weight_decay: 1e-4

  phase2:
    num_epochs: 40
    episodes_per_epoch: 400   # was 250 — more diversity per epoch
    lr: 5e-5                  # was 1e-4 — lower LR for ViT fine-tune stability
    weight_decay: 1e-4
    lambda_align: 0.2         # was 0.5 — less text-driven shaping
    lambda_vis2sem: 0.2       # was 0.5 — less text-driven shaping
    lambda_consist: 0.0

  optimizer: "adamw"
  scheduler:
    name: "cosine"
    warmup_epochs: 3          # was 5 — shorter warmup, more time at peak LR
    min_lr: 1e-6

  val_episodes: 200           # was 100 — halve val variance
  val_every_n_epochs: 5

  checkpoint_dir: "checkpoints/iu_xray_multilabel/"
  save_best: true
  save_every_n_epochs: 10

inference:
  text_strategy: "class_anchors"
  num_eval_episodes: 600
  confidence_interval: 0.95

logging:
  use_wandb: false
  wandb_project: "sgprotonet-iu-multilabel"
  wandb_entity: null
  log_every_n_steps: 10
